<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <title>PyScript App</title>
      
      <link rel="stylesheet" href="https://pyscript.net/releases/2026.7.2/core.css" />
      <script type="module" src="https://pyscript.net/releases/2026.7.2/core.js"></script>

  </head>
  <body>
    <h1>My PyScript</h1>

    <input type="text" id="name-input" placeholder="Enter your name"/>
    <button id="show-btn">Submit</button>

    <div id="name-display"></div>

    <label for="email-input">Email:</label>
    <input type="email" id="email-input" placeholder="Enter your email"/> <br>
    <label for="pass-input">Password</label>
    <input type="password" id="pass-input" placeholder="Enter password">
    <br>
    <button type="submit" id="submit-login">Submit</button>

    <script type="py" src="./main.py"></script> 
  </body>
</html>
